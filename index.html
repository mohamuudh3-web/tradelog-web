<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TradeLog Web</title>
<style>
  :root{--bg:#0f1722;--surf:#18222f;--surf2:#22303f;--txt:#e6edf3;--mut:#9aa5b1;--mint:#12d6a0;--win:#009669;--loss:#dc2626;--amber:#fbbf24;--bd:#2c3a4a}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt)}
  header{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--bg);z-index:5}
  header h1{font-size:18px;margin:0;color:var(--mint)}
  header .sp{flex:1}
  button{font:inherit;cursor:pointer;border-radius:10px;border:1px solid var(--bd);background:var(--surf2);color:var(--txt);padding:9px 14px}
  button.primary{background:var(--mint);color:#04201d;border-color:var(--mint);font-weight:600}
  button.win{background:var(--win);color:#fff;border:none}
  button.loss{background:var(--loss);color:#fff;border:none}
  button.ghost{background:transparent}
  input,select,textarea{font:inherit;width:100%;background:var(--surf);color:var(--txt);border:1px solid var(--bd);border-radius:10px;padding:10px;margin-top:4px}
  label{display:block;font-size:12px;color:var(--mut);margin-top:10px}
  .wrap{max-width:920px;margin:0 auto;padding:16px}
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .tabs button.active{background:var(--mint);color:#04201d;border-color:var(--mint)}
  .card{background:var(--surf);border:1px solid var(--bd);border-radius:16px;padding:16px;margin-bottom:12px}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .row>div{flex:1;min-width:120px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .pill{display:inline-block;padding:2px 8px;border-radius:8px;font-size:12px;font-weight:600}
  .muted{color:var(--mut);font-size:13px}
  .list .item{background:var(--surf);border:1px solid var(--bd);border-radius:14px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px}
  .item img{height:46px;border-radius:8px}
  .center{min-height:80vh;display:flex;align-items:center;justify-content:center}
  .auth{width:340px;max-width:90vw}
  .err{color:var(--loss);font-size:13px;margin-top:8px}
  .ok{color:var(--mint);font-size:13px;margin-top:8px}
  .imgs{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .imgs img{height:90px;border-radius:8px}
  h3{margin:0 0 8px}
  a{color:var(--mint)}
</style>
</head>
<body>
<div id="app"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const SUPABASE_URL = 'https://dhrrugmeyrjgubdjnksa.supabase.co'
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRocnJ1Z21leXJqZ3ViZGpua3NhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MDE4OTUsImV4cCI6MjA5NzA3Nzg5NX0.5tK1ZKc63kVGDQxHLXiUrynrflwQTJvWItj43_LvIBU'
const sb = createClient(SUPABASE_URL, SUPABASE_ANON)

const app = document.getElementById('app')
const uid = () => crypto.randomUUID()
const now = () => Date.now()
const esc = s => (s ?? '').toString().replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))
const money = n => (n < 0 ? '-' : '') + '$' + Math.abs(Number(n) || 0).toFixed(2)

let TAB = 'trades'

// ---------------- AUTH ----------------
async function init() {
  const { data: { session } } = await sb.auth.getSession()
  if (!session) return renderLogin()
  renderApp(session.user.email)
}

function renderLogin(msg) {
  app.innerHTML = `
    <div class="center"><div class="card auth">
      <h1 style="color:var(--mint);margin-top:0">TradeLog</h1>
      <div class="muted">Log in to sync with your phone.</div>
      <label>Email</label><input id="email" type="email" autocomplete="username">
      <label>Password</label><input id="pw" type="password" autocomplete="current-password">
      <div style="margin-top:14px;display:flex;gap:8px">
        <button class="primary" id="login" style="flex:1">Log in</button>
      </div>
      <div id="msg" class="${msg?.err ? 'err' : 'ok'}">${msg?.text || ''}</div>
    </div></div>`
  document.getElementById('login').onclick = async () => {
    const email = document.getElementById('email').value.trim()
    const password = document.getElementById('pw').value
    const { error } = await sb.auth.signInWithPassword({ email, password })
    if (error) renderLogin({ err: true, text: error.message })
    else init()
  }
}

function renderApp(email) {
  app.innerHTML = `
    <header><h1>TradeLog</h1><div class="sp"></div>
      <span class="muted">${esc(email)}</span>
      <button class="ghost" id="logout">Log out</button>
    </header>
    <div class="wrap">
      <div class="tabs" id="tabs"></div>
      <div id="content"></div>
    </div>`
  document.getElementById('logout').onclick = async () => { await sb.auth.signOut(); init() }
  const tabs = ['trades','backtests','accounts','payouts','journal','notes']
  document.getElementById('tabs').innerHTML = tabs.map(t =>
    `<button data-t="${t}" class="${t===TAB?'active':''}">${t[0].toUpperCase()+t.slice(1)}</button>`).join('')
  document.querySelectorAll('#tabs button').forEach(b => b.onclick = () => { TAB = b.dataset.t; renderApp(email) })
  renderTab()
}

// ---------------- helpers ----------------
async function load(table, order = 'updated_at') {
  const { data, error } = await sb.from(table).select('*').eq('deleted', false).order(order, { ascending: false })
  if (error) { alert(error.message); return [] }
  return data
}
async function insert(table, row) {
  const { error } = await sb.from(table).insert([{ uid: uid(), updated_at: now(), ...row }])
  if (error) { alert(error.message); return false }
  return true
}
async function softDelete(table, rowUid) {
  const { error } = await sb.from(table).update({ deleted: true, updated_at: now() }).eq('uid', rowUid)
  if (error) alert(error.message)
}
async function uploadImage(file) {
  if (!file) return ''
  const path = `${uid()}.${(file.name.split('.').pop() || 'jpg')}`
  const { error } = await sb.storage.from('screenshots').upload(path, file, { upsert: true })
  if (error) { alert('Image upload failed: ' + error.message); return '' }
  return sb.storage.from('screenshots').getPublicUrl(path).data.publicUrl
}

function content() { return document.getElementById('content') }

// ---------------- TABS ----------------
async function renderTab() {
  if (TAB === 'trades') return renderTrades()
  if (TAB === 'backtests') return renderBacktests()
  if (TAB === 'accounts') return renderAccounts()
  if (TAB === 'payouts') return renderPayouts()
  if (TAB === 'journal') return renderJournal()
  if (TAB === 'notes') return renderNotes()
}

// ---- Trades ----
async function renderTrades() {
  const accounts = await load('accounts')
  const rows = await load('trades', 'opened_at')
  content().innerHTML = `
    <div class="card"><h3>Add trade</h3>
      <div class="row">
        <div><label>Instrument</label><input id="t_ins" placeholder="EURUSD"></div>
        <div><label>Session</label><select id="t_ses"><option value="">—</option><option>LONDON</option><option>NEW YORK</option><option>ASIA</option></select></div>
        <div><label>Direction</label><select id="t_dir"><option value="LONG">Buy</option><option value="SHORT">Sell</option></select></div>
      </div>
      <div class="row">
        <div><label>Account</label><select id="t_acc"><option value="">—</option>${accounts.map(a=>`<option value="${a.uid}">${esc(a.name)}</option>`).join('')}</select></div>
        <div><label>Result</label><select id="t_res"><option value="WIN">WIN</option><option value="LOSS">LOSS</option><option value="BREAKEVEN">BE</option></select></div>
        <div><label>P&L (amount)</label><input id="t_pnl" type="number" placeholder="0"></div>
      </div>
      <div class="row">
        <div><label>Risk %</label><input id="t_risk" type="number"></div>
        <div><label>SL pips</label><input id="t_sl" type="number"></div>
        <div><label>TP pips</label><input id="t_tp" type="number"></div>
        <div><label>R multiple</label><input id="t_r" type="number"></div>
      </div>
      <label>Notes</label><textarea id="t_notes" rows="2"></textarea>
      <label>Screenshot (upload or paste URL)</label>
      <div class="row"><div><input id="t_file" type="file" accept="image/*"></div><div><input id="t_url" placeholder="https://...png"></div></div>
      <div style="margin-top:12px"><button class="primary" id="t_save">Save trade</button></div>
    </div>
    <h3>Recent trades</h3><div class="list" id="t_list">${rows.map(tradeItem).join('') || '<div class="muted">None yet.</div>'}</div>`
  document.getElementById('t_save').onclick = async () => {
    const res = document.getElementById('t_res').value
    const mag = Math.abs(parseFloat(document.getElementById('t_pnl').value) || 0)
    const pnl = res === 'WIN' ? mag : res === 'LOSS' ? -mag : 0
    const rMag = parseFloat(document.getElementById('t_r').value)
    const r = isNaN(rMag) ? null : (res === 'LOSS' ? -Math.abs(rMag) : res === 'WIN' ? Math.abs(rMag) : 0)
    let url = document.getElementById('t_url').value.trim()
    const f = document.getElementById('t_file').files[0]
    if (f) url = await uploadImage(f)
    const ok = await insert('trades', {
      instrument: document.getElementById('t_ins').value.trim(),
      session: document.getElementById('t_ses').value,
      direction: document.getElementById('t_dir').value,
      account_uid: document.getElementById('t_acc').value || null,
      result: res, pnl,
      risk_percent: parseFloat(document.getElementById('t_risk').value) || null,
      sl_pips: parseFloat(document.getElementById('t_sl').value) || null,
      tp_pips: parseFloat(document.getElementById('t_tp').value) || null,
      r_multiple: r,
      notes: document.getElementById('t_notes').value.trim(),
      screenshot_url: url || null,
      opened_at: now(), created_at: now()
    })
    if (ok) renderTrades()
  }
  bindDelete('trades', renderTrades)
}
function tradeItem(t) {
  const c = t.result === 'WIN' ? 'var(--win)' : t.result === 'LOSS' ? 'var(--loss)' : 'var(--mut)'
  return `<div class="item">
    <div style="display:flex;gap:10px;align-items:center">
      ${t.screenshot_url ? `<img src="${esc(t.screenshot_url)}">` : ''}
      <div><b>${esc(t.instrument)}</b> <span class="muted">${esc(t.direction)} · ${esc(t.session||'')}</span><br>
      <span class="muted">${new Date(t.opened_at).toLocaleDateString()}</span></div>
    </div>
    <div style="text-align:right"><b style="color:${c}">${money(t.pnl)}</b><br>
      <button class="ghost" data-del="${t.uid}">Delete</button></div>
  </div>`
}

// ---- Backtests ----
async function renderBacktests() {
  const rows = await load('backtests', 'date_millis')
  content().innerHTML = `
    <div class="card"><h3>Add backtest</h3>
      <div class="row">
        <div><label>Title</label><input id="b_title"></div>
        <div><label>Instrument</label><input id="b_ins" placeholder="EURUSD"></div>
      </div>
      <div class="row">
        <div><label>Direction</label><select id="b_dir"><option value="">—</option><option>Buy</option><option>Sell</option></select></div>
        <div><label>Scenario</label><select id="b_sc"><option value="">—</option><option>S1</option><option>S2</option><option>S3</option><option>S4</option></select></div>
        <div><label>SL pips</label><input id="b_sl" type="number"></div>
        <div><label>TP pips</label><input id="b_tp" type="number"></div>
      </div>
      <label>Notes</label><textarea id="b_notes" rows="2"></textarea>
      <div class="grid2">
        <div><label>5MIN chart (upload / URL)</label><input id="b_f5" type="file" accept="image/*"><input id="b_u5" placeholder="https://...png" style="margin-top:6px"></div>
        <div><label>15MIN chart (upload / URL)</label><input id="b_f15" type="file" accept="image/*"><input id="b_u15" placeholder="https://...png" style="margin-top:6px"></div>
      </div>
      <div style="margin-top:12px;display:flex;gap:10px">
        <button class="win" id="b_win">Save · WIN</button>
        <button class="loss" id="b_loss">Save · LOSS</button>
      </div>
    </div>
    <h3>Backtests</h3><div class="list" id="b_list">${rows.map(btItem).join('') || '<div class="muted">None yet.</div>'}</div>`
  const save = async (result) => {
    let u5 = document.getElementById('b_u5').value.trim(); const f5 = document.getElementById('b_f5').files[0]; if (f5) u5 = await uploadImage(f5)
    let u15 = document.getElementById('b_u15').value.trim(); const f15 = document.getElementById('b_f15').files[0]; if (f15) u15 = await uploadImage(f15)
    const ok = await insert('backtests', {
      title: document.getElementById('b_title').value.trim() || 'Untitled backtest',
      instrument: document.getElementById('b_ins').value.trim(),
      direction: document.getElementById('b_dir').value,
      session: document.getElementById('b_sc').value,
      result,
      sl_pips: parseFloat(document.getElementById('b_sl').value) || null,
      tp_pips: parseFloat(document.getElementById('b_tp').value) || null,
      notes: document.getElementById('b_notes').value.trim(),
      chart5_url: u5, chart15_url: u15,
      date_millis: now(), created_at: now()
    })
    if (ok) renderBacktests()
  }
  document.getElementById('b_win').onclick = () => save('WIN')
  document.getElementById('b_loss').onclick = () => save('LOSS')
  bindDelete('backtests', renderBacktests)
}
function btItem(b) {
  const cover = b.chart5_url || b.chart15_url
  const c = b.result === 'WIN' ? 'var(--win)' : 'var(--loss)'
  return `<div class="item">
    <div style="display:flex;gap:10px;align-items:center">
      ${cover ? `<img src="${esc(cover)}">` : ''}
      <div><b>${esc(b.instrument||b.title)}</b> <span class="pill" style="background:${c};color:#fff">${esc(b.result||'')}</span><br>
      <span class="muted">${esc(b.direction||'')} ${esc(b.session||'')} · ${new Date(b.date_millis).toLocaleDateString()}</span><br>
      <span class="muted">${esc((b.notes||'').slice(0,60))}</span></div>
    </div>
    <button class="ghost" data-del="${b.uid}">Delete</button>
  </div>`
}

// ---- Accounts ----
async function renderAccounts() {
  const rows = await load('accounts')
  content().innerHTML = `
    <div class="card"><h3>Add account</h3>
      <div class="row">
        <div><label>Name</label><input id="a_name"></div>
        <div><label>Broker / prop firm</label><input id="a_broker"></div>
      </div>
      <div class="row">
        <div><label>Starting balance</label><input id="a_bal" type="number"></div>
        <div><label>Currency</label><input id="a_cur" value="USD"></div>
        <div><label>Prop firm?</label><select id="a_prop"><option value="false">No</option><option value="true">Yes</option></select></div>
      </div>
      <div style="margin-top:12px"><button class="primary" id="a_save">Save account</button></div>
    </div>
    <h3>Accounts</h3><div class="list" id="a_list">${rows.map(a=>`<div class="item"><div><b>${esc(a.name)}</b><br><span class="muted">${esc(a.broker)} · ${money(a.balance)} ${esc(a.currency)}</span></div><button class="ghost" data-del="${a.uid}">Delete</button></div>`).join('') || '<div class="muted">None yet.</div>'}</div>`
  document.getElementById('a_save').onclick = async () => {
    const ok = await insert('accounts', {
      name: document.getElementById('a_name').value.trim(),
      broker: document.getElementById('a_broker').value.trim(),
      balance: parseFloat(document.getElementById('a_bal').value) || 0,
      currency: document.getElementById('a_cur').value.trim().toUpperCase() || 'USD',
      is_prop_firm: document.getElementById('a_prop').value === 'true',
      created_at: now()
    })
    if (ok) renderAccounts()
  }
  bindDelete('accounts', renderAccounts)
}

// ---- Payouts ----
async function renderPayouts() {
  const rows = await load('payouts', 'date')
  content().innerHTML = `
    <div class="card"><h3>Add payout</h3>
      <div class="row">
        <div><label>Account / firm</label><input id="p_acc"></div>
        <div><label>Date (yyyy-mm-dd)</label><input id="p_date" type="date"></div>
      </div>
      <div class="row">
        <div><label>Amount</label><input id="p_amt" type="number"></div>
        <div><label>Currency</label><input id="p_cur" value="USD"></div>
        <div><label>Status</label><select id="p_st"><option>PENDING</option><option>PAID</option></select></div>
      </div>
      <label>Notes</label><textarea id="p_notes" rows="2"></textarea>
      <div style="margin-top:12px"><button class="primary" id="p_save">Save payout</button></div>
    </div>
    <h3>Payouts</h3><div class="list">${rows.map(p=>`<div class="item"><div><b>${esc(p.account_name||'Payout')}</b><br><span class="muted">${esc(p.date)} · ${esc(p.status)}</span></div><div style="text-align:right"><b>${money(p.amount)}</b><br><button class="ghost" data-del="${p.uid}">Delete</button></div></div>`).join('') || '<div class="muted">None yet.</div>'}</div>`
  document.getElementById('p_save').onclick = async () => {
    const ok = await insert('payouts', {
      account_name: document.getElementById('p_acc').value.trim(),
      date: document.getElementById('p_date').value || new Date().toISOString().slice(0,10),
      amount: parseFloat(document.getElementById('p_amt').value) || 0,
      currency: document.getElementById('p_cur').value.trim().toUpperCase() || 'USD',
      status: document.getElementById('p_st').value,
      notes: document.getElementById('p_notes').value.trim(),
      created_at: now()
    })
    if (ok) renderPayouts()
  }
  bindDelete('payouts', renderPayouts)
}

// ---- Journal ----
async function renderJournal() {
  const rows = await load('journal_entries', 'date')
  content().innerHTML = `
    <div class="card"><h3>Add daily entry</h3>
      <div class="row">
        <div><label>Date</label><input id="j_date" type="date"></div>
        <div><label>Title</label><input id="j_title"></div>
      </div>
      <label>Battle plan</label><textarea id="j_plan" rows="2"></textarea>
      <label>Reflection</label><textarea id="j_ref" rows="2"></textarea>
      <div style="margin-top:12px"><button class="primary" id="j_save">Save entry</button></div>
    </div>
    <h3>Entries</h3><div class="list">${rows.map(j=>`<div class="item"><div><b>${esc(j.date)}</b> ${esc(j.title||'')}<br><span class="muted">${esc((j.reflection||j.battle_plan||'').slice(0,70))}</span></div><button class="ghost" data-del="${j.uid}">Delete</button></div>`).join('') || '<div class="muted">None yet.</div>'}</div>`
  document.getElementById('j_save').onclick = async () => {
    const ok = await insert('journal_entries', {
      date: document.getElementById('j_date').value || new Date().toISOString().slice(0,10),
      title: document.getElementById('j_title').value.trim(),
      battle_plan: document.getElementById('j_plan').value.trim(),
      reflection: document.getElementById('j_ref').value.trim(),
      created_at: now()
    })
    if (ok) renderJournal()
  }
  bindDelete('journal_entries', renderJournal)
}

// ---- Notes ----
async function renderNotes() {
  const rows = await load('notes')
  content().innerHTML = `
    <div class="card"><h3>Add note</h3>
      <label>Title</label><input id="n_title">
      <label>Tags</label><input id="n_tags">
      <label>Body</label><textarea id="n_body" rows="4"></textarea>
      <div style="margin-top:12px"><button class="primary" id="n_save">Save note</button></div>
    </div>
    <h3>Notes</h3><div class="list">${rows.map(n=>`<div class="item"><div><b>${esc(n.title)}</b><br><span class="muted">${esc((n.body||'').slice(0,80))}</span></div><button class="ghost" data-del="${n.uid}">Delete</button></div>`).join('') || '<div class="muted">None yet.</div>'}</div>`
  document.getElementById('n_save').onclick = async () => {
    const ok = await insert('notes', {
      title: document.getElementById('n_title').value.trim(),
      tags: document.getElementById('n_tags').value.trim(),
      body: document.getElementById('n_body').value.trim()
    })
    if (ok) renderNotes()
  }
  bindDelete('notes', renderNotes)
}

function bindDelete(table, rerender) {
  document.querySelectorAll('[data-del]').forEach(b => b.onclick = async () => {
    if (confirm('Delete this?')) { await softDelete(table, b.dataset.del); rerender() }
  })
}

init()
</script>
</body>
</html>
